title: Credential Access - LSASS Memory Access
id: a1b2c3d4-0009-4000-a000-000000000009
status: stable
description: Detects processes accessing LSASS memory, a common credential theft technique.
author: DetonationChamber
logsource:
  category: process_access
  product: windows
detection:
  selection:
    TargetImage|endswith: '\lsass.exe'
  filter_system:
    SourceImage|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Program Files\Windows Defender\'
  filter_av:
    SourceImage|contains:
      - 'MsMpEng'
      - 'csfalconservice'
  condition: selection and not (filter_system or filter_av)
level: critical
tags:
  - attack.credential_access
  - attack.t1003.001
