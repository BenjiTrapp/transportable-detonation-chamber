title: Scheduled Task Creation for Persistence
id: a1b2c3d4-0010-4000-a000-000000000010
status: stable
description: Detects schtasks.exe creating new scheduled tasks, a common persistence mechanism.
author: DetonationChamber
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\schtasks.exe'
    CommandLine|contains:
      - '/create'
  filter_system:
    ParentImage|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Program Files\'
  condition: selection and not filter_system
level: medium
tags:
  - attack.persistence
  - attack.t1053.005
