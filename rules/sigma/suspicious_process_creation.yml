title: Suspicious Shell Spawned by Unusual Parent
id: a1b2c3d4-0001-4000-a000-000000000001
status: stable
description: Detects cmd.exe or powershell.exe spawned by processes that typically don't launch shells (e.g., Office, Adobe, browsers).
author: DetonationChamber
logsource:
  category: process_creation
  product: windows
detection:
  selection_shell:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_parent:
    ParentImage|endswith:
      - '\winword.exe'
      - '\excel.exe'
      - '\powerpnt.exe'
      - '\outlook.exe'
      - '\acrobat.exe'
      - '\acrord32.exe'
      - '\chrome.exe'
      - '\msedge.exe'
      - '\firefox.exe'
      - '\mshta.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\rundll32.exe'
      - '\regsvr32.exe'
  condition: selection_shell and selection_parent
level: high
tags:
  - attack.execution
  - attack.t1059
  - attack.initial_access
